[target.thumbv8m.main-none-eabihf]
# Use the probe-rs runner and 'cargo embed' when connected with the debug probe
runner = "probe-rs run --chip RP235x --protocol swd"
# Use picotool and 'cargo run' when connected in boot mode (Hold bootsel while connecting)
#runner = "picotool load -u -v -x -t elf"

rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "target-cpu=cortex-m33",
]

[build]
target = "thumbv8m.main-none-eabihf"

[env]
# Use "debug" to show debugging
DEFMT_LOG = "off"